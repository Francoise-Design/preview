<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francoise</title>
    
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/ballonest" rel="stylesheet">

    <style>
    :root {
        --brand-red: #CE0016;
        --brand-red-hover: #b00013;
        --text-grey: #666666;
        --footer-grey: #8a8a8a;
        --legal-grey: #cfcfcf;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Switzer', sans-serif;
        background-color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* --- LOGO --- */
/* --- TEXT LOGO --- */
.logo-wrapper {
    display: flex;
    flex-direction: column;
    align-items: flex-end; /* Выравнивает подзаголовки по правому краю */
    margin-top: 40px;
    margin-bottom: 80px;
    z-index: 1;
    animation: fadeInDown 0.8s ease-out;
}

.logo-main {
    font-family: 'Ballonest', cursive;
    font-size: 360px;
    color: var(--brand-red);
    font-weight: 400;
    line-height: 0.8;
    margin-bottom: 12px;
}

.logo-sub-title {
    font-family: 'Switzer', sans-serif;
    font-size: 24px;
    font-weight: 800; /* Жирное начертание как на макете */
    color: #000000;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
}

.logo-sub-desc {
    font-family: 'Switzer', sans-serif;
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: #000000;
}

    .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 2;
        width: 100%;
    }

    /* --- BUTTONS --- */
.buttons-container {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 120px;
    z-index: 6;
}

    .btn {
        background-color: var(--brand-red);
        color: white;
        border: none;
        padding: 16px 48px;
        font-family: 'Switzer', sans-serif;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.05em;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 4px 12px rgba(206, 0, 22, 0.2);
            z-index: 6;
    }

    .btn:hover {
        background-color: var(--brand-red-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(206, 0, 22, 0.3);
    }

    .btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(206, 0, 22, 0.2);
    }

    .btn svg {
        width: 14px;
        height: 14px;
        fill: white;
        transition: transform 0.3s ease;
    }

    .btn:hover svg {
        transform: translateY(2px);
    }

    /* --- FOOTER --- */
    .footer {
        position: absolute;
        bottom: 40px;
        width: 100%;
        padding: 0 60px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        animation: fadeIn 1s ease-out 0.5s backwards;
    }

    .social-links {
        display: flex;
        gap: 40px;
        align-items: center;
    }

    .social-link {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--footer-grey);
        font-weight: 500;
        font-size: 14px;
        transition: color 0.2s ease;
    }

    .social-link:hover {
        color: var(--brand-red);
    }

    .social-link svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
        transition: fill 0.2s ease;
    }

    .copyright {
        font-size: 11px;
        color: var(--legal-grey);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-align: right;
        font-weight: 400;
    }

    /* --- АНИМАЦИИ --- */
    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* --- АДАПТИВ --- */
    @media (max-width: 768px) {
.logo-wrapper {
        align-items: center; /* Центрируем на мобильных */
        margin-top: 20px;
        margin-bottom: 40px;
        text-align: center;
    }

    .logo-main {
        font-size: 80px;
    }

    .logo-sub-title {
        font-size: 18px;
    }

    .logo-sub-desc {
        font-size: 14px;
    }

        .buttons-container {
            flex-direction: column;
            gap: 16px;
            width: 80%;
            padding: 0 24px;
            margin-bottom: 60px;
        }
        .btn {
            width: 100%;
            justify-content: center;
            padding: 18px;
        }

        .footer {
            position: relative;
            bottom: auto;
            flex-direction: column-reverse;
            gap: 40px;
            padding: 40px 20px;
            text-align: center;
        }
        .social-links {
            flex-direction: column;
            gap: 20px;
        }
        .copyright {
            text-align: center;
            line-height: 1.6;
        }
    }
    </style>
</head>
