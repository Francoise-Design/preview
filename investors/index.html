<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Françoise - Pitch Deck</title>
    <style>
        /* --- Подключение кастомного шрифта --- */
        @font-face {
            font-family: 'Jomhuria';
            src: url('fonts/Jomhuria-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Основные стили страницы */
        body {
            margin: 0;
            padding: 0;
            background-color: #d6e0e9; /* Светло-серо-голубой фон */
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Заголовок Françoise */
        header {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-family: 'Jomhuria', 'Georgia', serif; /* Применили новый шрифт */
            font-size: clamp(5rem, 18vw, 15rem);
            font-weight: normal; /* Для кастомных шрифтов часто лучше сбрасывать жирность */
            color: #e3001b; /* Ярко-красный */
            margin: 0;
            line-height: 0.8;
            letter-spacing: -0.04em;
        }

        /* --- Контейнер для видео --- */
        .media-frame-wide {
            width: 80%;
            max-width: 880px;
            aspect-ratio: 16 / 9;
            background: #ffffff;
            position: relative;
            z-index: 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.8s ease-out;
            margin: -3% auto 80px auto;
        }

        /* --- Стили для кнопки управления видео --- */
        .video-control-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .video-control-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.05);
        }

        .video-control-btn svg {
            width: 16px;
            height: 16px;
            fill: #ffffff;
        }

        .icon-play {
            margin-left: 2px;
            display: none;
        }

        .icon-pause {
            display: block;
        }

        .video-paused .icon-play {
            display: block;
        }

        .video-paused .icon-pause {
            display: none;
        }

        /* Секция с информацией под видео */
        .info-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 60px;
        }

        /* --- Кнопка скачивания Pitch Deck --- */
        .pitch-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 700;
            color: #ffffff;
            background-color: #000000;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .pitch-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .pitch-link:hover {
            background-color: #e3001b;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(227, 0, 27, 0.3);
        }

        .pitch-link:hover svg {
            transform: translateY(2px);
        }

        /* Правый текстовый блок */
        .description-block {
            text-align: right;
            max-width: 600px;
        }

        .red-heading {
            font-family: 'Jomhuria', 'Arial Black', sans-serif; /* Применили новый шрифт */
            font-weight: normal; /* Сброс жирности для Jomhuria */
            color: #e3001b;
            font-size: clamp(2rem, 5vw, 3.5rem); /* Немного увеличил размер, так как Jomhuria обычно выглядит мельче стандартных шрифтов */
            margin: 0 0 5px 0;
            line-height: 0.9;
            letter-spacing: 0;
        }

        .black-subheading {
            font-family: system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            font-weight: 400;
            margin: 0;
        }

        /* Подвал со ссылками */
        footer {
            margin-top: auto;
            padding-bottom: 40px;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
        }

        .contact-links a {
            color: #000000;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .contact-links a:hover {
            opacity: 0.7;
        }

        .divider {
            color: #000000;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .media-frame-wide {
                width: 95%;
                margin-top: 20px;
            }
            .info-section {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .description-block {
                text-align: center;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">Françoise</h1>
    </header>

    <main>
        <div class="media-frame-wide reveal-up delay-200" id="heroVideoFrame">
            <video id="heroVideo" autoplay muted loop playsinline
                   style="width:100%; height:100%; object-fit:cover;">
                <source src="video.mp4" type="video/mp4">
            </video>
            <button class="video-control-btn" onclick="toggleHeroVideo()">
                <svg class="icon-pause" viewBox="0 0 12 14">
                    <rect width="4" height="14"/>
                    <rect x="8" width="4" height="14"/>
                </svg>
                <svg class="icon-play" viewBox="0 0 12 14">
                    <path d="M0 0L12 7L0 14V0Z"/>
                </svg>
            </button>
        </div>
    </main>

    <section class="info-section">
        <div class="left-col">
            <a href="Pitch Deck.pdf" class="pitch-link" download>
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                Download Pitch Deck
            </a>
        </div>

        <div class="description-block">
            <h2 class="red-heading">Neuro-symbolic verifier for<br>deterministic AI outputs</h2>
            <p class="black-subheading">Smart as an LLM. Precise as math. Cost effective.</p>
        </div>
    </section>

    <footer>
        <div class="contact-links">
            <a href="mailto:daria@francoise.design">daria@francoise.design</a>
            <span class="divider">|</span>
            <a href="https://meet.francoise.design" target="_blank" rel="noopener">meet.francoise.design</a>
            <span class="divider">|</span>
            <a href="https://francoise.design" target="_blank" rel="noopener">francoise.design</a>
        </div>
    </footer>
</div>

<script>
    function toggleHeroVideo() {
        const v = document.getElementById('heroVideo'), c = document.getElementById('heroVideoFrame');
        if (v.paused) {
            v.play();
            c.classList.remove('video-paused');
        } else {
            v.pause();
            c.classList.add('video-paused');
        }
    }

    function pauseAutoPlay() {
        if(typeof globalTabInterval !== 'undefined' && globalTabInterval) {
            clearInterval(globalTabInterval);
        }
    }
</script>
</body>
</html>
