<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francoise | Investor Portal</title>
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/ballonest" rel="stylesheet">

    <style>
        :root {
            --brand-red: #CE0016;
            --brand-red-hover: #b00013;
            --text-grey: #666666;
            --footer-grey: #8a8a8a;
            --legal-grey: #cfcfcf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Switzer', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- LOGO --- */
        .logo {
            font-family: 'Ballonest', sans-serif;
            color: var(--brand-red);
            font-size: clamp(120px, 15vw, 240px); /* Адаптивный размер от мобилки до десктопа */
            line-height: 1;
            font-weight: normal;
            margin-top: 40px;
            margin-bottom: 10px;
            transform: rotate(-2deg);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInDown 0.8s ease-out;
        }

        /* --- CONTENT --- */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .subtitle {
            font-weight: 300; /* Light */
            color: var(--text-grey);
            font-size: 20px;
            letter-spacing: 0.02em;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
        }

        .subtitle strong {
            color: #000;
            font-weight: 500;
        }

        /* --- VIDEO BLOCK --- */
        .video-container {
            width: 100%;
            max-width: 800px;
            background-color: #000;
            aspect-ratio: 16 / 9;
            border-radius: 8px; /* Немного скруглим углы для элегантности */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 50px;
            position: relative;
        }

        .video-container video,
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        /* --- BUTTONS --- */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 120px;
        }

        .btn {
            background-color: var(--brand-red);
            color: white;
            border: none;
            padding: 16px 40px;
            font-family: 'Switzer', sans-serif;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.05em;
            border-radius: 4px; /* Более острые углы в стиле старого макета */
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 12px rgba(206, 0, 22, 0.2);
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--brand-red-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(206, 0, 22, 0.3);
        }

        .btn svg {
            width: 14px;
            height: 14px;
            fill: white;
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateY(2px);
        }

        /* --- FOOTER --- */
        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            padding: 0 60px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 1s ease-out 0.5s backwards;
        }

        .social-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--footer-grey);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .social-link:hover {
            color: var(--brand-red);
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: fill 0.2s ease;
        }

        .copyright {
            font-size: 11px;
            color: var(--legal-grey);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: right;
            font-weight: 400;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px) rotate(-2deg); }
            to { opacity: 1; transform: translateY(0) rotate(-2deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            body {
                padding-top: 40px;
                justify-content: flex-start;
            }

            .subtitle {
                font-size: 16px;
                margin-bottom: 30px;
            }

            .buttons-container {
                flex-direction: column;
                width: 100%;
                gap: 16px;
                margin-bottom: 60px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .footer {
                position: relative;
                bottom: auto;
                flex-direction: column-reverse;
                gap: 30px;
                padding: 40px 20px 20px;
                text-align: center;
            }

            .social-links {
                flex-direction: column;
                gap: 20px;
            }

            .copyright {
                text-align: center;
                line-height: 1.6;
            }
        }
    </style>
</head>
<body>

</body>
</html>
